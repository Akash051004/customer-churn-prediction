<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Churn Prediction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 900px;
      width: 100%;
    }

    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input,
    select {
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    button {
      grid-column: 1 / -1;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      margin: 20px 0;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result {
      display: none;
      border-radius: 5px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }

    .high-risk {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      color: #c62828;
    }

    .low-risk {
      background-color: #e8f5e9;
      border-left: 4px solid #4caf50;
      color: #2e7d32;
    }

    .result h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .result p {
      margin: 8px 0;
      line-height: 1.5;
    }

    .recommendations {
      text-align: left;
      margin-top: 15px;
      background: rgba(0, 0, 0, 0.05);
      padding: 15px;
      border-radius: 3px;
    }

    .recommendations h4 {
      margin-bottom: 10px;
    }

    .recommendations ul {
      list-style-position: inside;
      padding-left: 0;
    }

    .recommendations li {
      margin: 5px 0;
    }

    .error {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      color: #c62828;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎯 Customer Churn Prediction System</h1>
    <p class="subtitle">Enter customer details to predict churn probability</p>

    <form id="predictionForm" class="form-grid">
      <div class="form-group">
        <label for="tenure">Tenure (months)</label>
        <input type="number" id="tenure" name="tenure" min="0" max="72" value="12" required>
      </div>

      <div class="form-group">
        <label for="contract">Contract Type</label>
        <select id="contract" name="contract" required>
          <option value="Month-to-month">Month-to-month</option>
          <option value="One year">One year</option>
          <option value="Two year">Two year</option>
        </select>
      </div>

      <div class="form-group">
        <label for="payment_method">Payment Method</label>
        <select id="payment_method" name="payment_method" required>
          <option value="Electronic check">Electronic check</option>
          <option value="Mailed check">Mailed check</option>
          <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
          <option value="Credit card (automatic)">Credit card (automatic)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="internet_service">Internet Service</label>
        <select id="internet_service" name="internet_service" required>
          <option value="DSL">DSL</option>
          <option value="Fiber optic">Fiber optic</option>
          <option value="No">No</option>
        </select>
      </div>

      <div class="form-group">
        <label for="online_security">Online Security</label>
        <select id="online_security" name="online_security" required>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label for="tech_support">Tech Support</label>
        <select id="tech_support" name="tech_support" required>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label for="streaming_tv">Streaming TV</label>
        <select id="streaming_tv" name="streaming_tv" required>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label for="monthly_charges">Monthly Charges ($)</label>
        <input type="number" id="monthly_charges" name="monthly_charges" min="20" max="120" step="0.01" value="65.00"
          required>
      </div>

      <div class="form-group">
        <label for="total_charges">Total Charges ($)</label>
        <input type="number" id="total_charges" name="total_charges" min="0" max="9000" step="0.01" value="780.00"
          required>
      </div>

      <div class="form-group">
        <label for="paperless">Paperless Billing</label>
        <select id="paperless" name="paperless" required>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label for="senior_citizen">Senior Citizen</label>
        <select id="senior_citizen" name="senior_citizen" required>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <button type="submit">Predict Churn Risk</button>
    </form>

    <div class="loading" id="loading">
      <span class="spinner"></span>
      <span>Analyzing customer data...</span>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('predictionForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      loading.style.display = 'block';
      result.style.display = 'none';

      const formData = new FormData(this);
      const data = Object.fromEntries(formData);

      data.tenure = parseInt(data.tenure);
      data.monthly_charges = parseFloat(data.monthly_charges);
      data.total_charges = parseFloat(data.total_charges);

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        });

        const prediction = await response.json();

        loading.style.display = 'none';

        if (prediction.error) {
          result.innerHTML = '<div style="background-color: #ffebee; border-left: 4px solid #f44336; color: #c62828; padding: 15px; border-radius: 5px;">Error: ' + prediction.error + '</div>';
          result.style.display = 'block';
        } else {
          const riskClass = prediction.churn_prediction === 1 ? 'high-risk' : 'low-risk';
          const riskText = prediction.churn_prediction === 1 ? '⚠️  HIGH CHURN RISK' : '✅ LOW CHURN RISK';

          // Set the result div class
          result.className = riskClass;

          let html = '<h3>' + riskText + '</h3>';
          html += '<p><strong>Churn Probability: ' + prediction.churn_probability.toFixed(1) + '%</strong></p>';
          html += '<p>' + prediction.message + '</p>';

          if (prediction.recommendations) {
            html += '<div class="recommendations">';
            html += '<h4>📋 Recommended Actions:</h4>';
            html += '<ul>';
            const recs = prediction.recommendations.split('.').filter(r => r.trim());
            for (let rec of recs) {
              if (rec.trim()) {
                html += '<li>' + rec.trim() + '</li>';
              }
            }
            html += '</ul></div>';
          }

          result.innerHTML = html;
          result.style.display = 'block';
        }
      } catch (error) {
        loading.style.display = 'none';
        result.innerHTML = '<div style="background-color: #ffebee; border-left: 4px solid #f44336; color: #c62828; padding: 15px; border-radius: 5px;">Error: ' + error.message + '</div>';
        result.style.display = 'block';
      }
    });
  </script>
</body>

</html>
